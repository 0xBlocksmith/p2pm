# Next.js app in the frontend/ subfolder. `base` is declared HERE (not only in
# the Netlify UI) so re-importing the site can never build at the repo root.
# Commands and the publish path are RELATIVE to that base. publish = .next.
# `npm ci` (not install) — reproducible builds from the committed lockfile.
[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"
