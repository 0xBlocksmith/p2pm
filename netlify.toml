# Next.js app in the frontend/ subfolder. The Netlify "Base directory" is set to
# `frontend`, so the build already runs inside frontend/ — commands and the
# publish path here are RELATIVE to that base. publish = .next (≠ base).
[build]
  command = "npm install && npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"
