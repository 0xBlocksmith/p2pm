<svg xmlns="http://www.w3.org/2000/svg" width="520" height="140" viewBox="0 0 520 140" fill="none" role="img" aria-label="PayQR">
  <defs>
    <linearGradient id="pqGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b7fff"/>
      <stop offset="1" stop-color="#1fd17e"/>
    </linearGradient>
    <linearGradient id="pqText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0.45" stop-color="#0b1f4d"/>
      <stop offset="0.55" stop-color="#2b7fff"/>
      <stop offset="1" stop-color="#1fd17e"/>
    </linearGradient>
  </defs>

  <!-- ICON: rounded-square frame + stylized P + QR dots -->
  <g transform="translate(10,10)">
    <rect x="2" y="2" width="116" height="116" rx="30" fill="none" stroke="url(#pqGrad)" stroke-width="6"/>
    <!-- scan corner brackets -->
    <g stroke="url(#pqGrad)" stroke-width="5" stroke-linecap="round" fill="none">
      <path d="M30 26 h-8 v8"/>
      <path d="M90 26 h8 v8"/>
      <path d="M30 94 h-8 v-8"/>
      <path d="M90 94 h8 v-8"/>
    </g>
    <!-- stylized P -->
    <path d="M46 34 v52 M46 34 h22 a16 16 0 0 1 0 32 h-22"
          fill="none" stroke="url(#pqGrad)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- QR dots cluster -->
    <g fill="#0b1f4d">
      <rect x="52" y="40" width="9" height="9" rx="1.5"/>
      <rect x="64" y="40" width="9" height="9" rx="1.5"/>
      <rect x="52" y="52" width="5" height="5"/>
      <rect x="62" y="52" width="5" height="5"/>
      <rect x="69" y="54" width="4" height="4"/>
      <rect x="52" y="62" width="9" height="9" rx="1.5"/>
      <rect x="66" y="63" width="4" height="4"/>
      <rect x="72" y="62" width="4" height="4"/>
    </g>
  </g>

  <!-- WORDMARK: PayQR -->
  <text x="150" y="86" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif"
        font-size="62" font-weight="800" letter-spacing="-1">
    <tspan fill="#0b1f4d">Pay</tspan><tspan fill="url(#pqGrad)">QR</tspan>
  </text>
  <!-- sub -->
  <text x="152" y="112" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif"
        font-size="16" font-weight="700" letter-spacing="3" fill="#5b6b8c">dApp</text>
</svg>
